<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: #0A1628;
  font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 60px;
}
.content {
  text-align: center;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.logo-container {
  margin-bottom: 60px;
}
.logo-icon {
  width: 140px;
  height: 140px;
  background: linear-gradient(145deg, #F7931A 0%, #FFB84D 100%);
  border-radius: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  color: white;
  font-size: 72px;
  margin: 0 auto 24px;
  box-shadow: 0 20px 60px rgba(247, 147, 26, 0.4);
}
.logo-text {
  color: white;
  font-size: 64px;
  font-weight: 800;
  letter-spacing: -1px;
}
.tagline {
  color: #F7931A;
  font-size: 72px;
  font-weight: 800;
  margin-bottom: 40px;
  text-shadow: 0 4px 20px rgba(247, 147, 26, 0.3);
}
.subtitle {
  color: white;
  font-size: 36px;
  font-weight: 600;
  margin-bottom: 16px;
  line-height: 1.3;
}
.description {
  color: #8B9CB8;
  font-size: 28px;
  font-weight: 500;
  margin-bottom: 60px;
  line-height: 1.4;
  max-width: 900px;
}
.qr-section {
  margin-bottom: 60px;
}
.qr-placeholder {
  width: 280px;
  height: 280px;
  background: white;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}
.qr-code {
  width: 240px;
  height: 240px;
}
.url {
  color: #F7931A;
  font-size: 32px;
  font-weight: 700;
}
.asofom-badge {
  display: flex;
  align-items: center;
  gap: 16px;
  background: rgba(255,255,255,0.05);
  padding: 20px 32px;
  border-radius: 12px;
  margin-bottom: 40px;
  border: 1px solid rgba(255,255,255,0.1);
}
.asofom-icon {
  width: 48px;
  height: 48px;
  background: #22C55E;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 28px;
  font-weight: bold;
}
.asofom-text {
  color: white;
  font-size: 24px;
  font-weight: 600;
}
.footer {
  margin-top: auto;
  padding-top: 40px;
}
.disclaimer {
  color: #5A6A82;
  font-size: 18px;
  line-height: 1.5;
  max-width: 900px;
  text-align: center;
}
</style>
</head>
<body>
<div class="content">
  <div class="logo-container">
    <div class="logo-icon">₿</div>
    <div class="logo-text">ArcadiaB</div>
  </div>
  
  <div class="tagline">Protege lo tuyo.</div>
  
  <div class="subtitle">Bitcoin Treasury para México.</div>
  <div class="description">Tu patrimonio, en el activo más duro del mundo.</div>
  
  <div class="qr-section">
    <div class="qr-placeholder">
      <!-- QR code placeholder - will be replaced with actual QR -->
      <svg class="qr-code" viewBox="0 0 100 100">
        <rect fill="white" width="100" height="100"/>
        <rect fill="#0A1628" x="10" y="10" width="25" height="25"/>
        <rect fill="#0A1628" x="65" y="10" width="25" height="25"/>
        <rect fill="#0A1628" x="10" y="65" width="25" height="25"/>
        <rect fill="#0A1628" x="15" y="15" width="15" height="15" fill="white"/>
        <rect fill="#0A1628" x="70" y="15" width="15" height="15" fill="white"/>
        <rect fill="#0A1628" x="15" y="70" width="15" height="15" fill="white"/>
        <rect fill="#0A1628" x="18" y="18" width="9" height="9"/>
        <rect fill="#0A1628" x="73" y="18" width="9" height="9"/>
        <rect fill="#0A1628" x="18" y="73" width="9" height="9"/>
        <!-- Pattern -->
        <rect fill="#0A1628" x="40" y="10" width="5" height="5"/>
        <rect fill="#0A1628" x="50" y="10" width="5" height="5"/>
        <rect fill="#0A1628" x="40" y="20" width="5" height="5"/>
        <rect fill="#0A1628" x="45" y="25" width="5" height="5"/>
        <rect fill="#0A1628" x="55" y="20" width="5" height="5"/>
        <rect fill="#0A1628" x="40" y="40" width="20" height="20"/>
        <rect fill="white" x="45" y="45" width="10" height="10"/>
        <rect fill="#0A1628" x="47" y="47" width="6" height="6"/>
        <rect fill="#0A1628" x="10" y="40" width="5" height="5"/>
        <rect fill="#0A1628" x="20" y="45" width="5" height="5"/>
        <rect fill="#0A1628" x="10" y="55" width="5" height="5"/>
        <rect fill="#0A1628" x="65" y="40" width="5" height="5"/>
        <rect fill="#0A1628" x="75" y="45" width="5" height="5"/>
        <rect fill="#0A1628" x="85" y="50" width="5" height="5"/>
        <rect fill="#0A1628" x="65" y="55" width="5" height="5"/>
        <rect fill="#0A1628" x="40" y="65" width="5" height="5"/>
        <rect fill="#0A1628" x="50" y="70" width="5" height="5"/>
        <rect fill="#0A1628" x="45" y="80" width="5" height="5"/>
        <rect fill="#0A1628" x="55" y="75" width="5" height="5"/>
        <rect fill="#0A1628" x="65" y="65" width="25" height="25"/>
        <rect fill="white" x="70" y="70" width="15" height="15"/>
        <rect fill="#0A1628" x="73" y="73" width="9" height="9"/>
        <rect fill="#0A1628" x="40" y="85" width="5" height="5"/>
        <rect fill="#0A1628" x="85" y="65" width="5" height="5"/>
        <rect fill="#0A1628" x="85" y="85" width="5" height="5"/>
      </svg>
    </div>
    <div class="url">arcadiab.com</div>
  </div>
  
  <div class="asofom-badge">
    <div class="asofom-icon">✓</div>
    <div class="asofom-text">ASOFOM Certified • SOFOM E.N.R.</div>
  </div>
</div>

<div class="footer">
  <div class="disclaimer">
    Bitcoin es un activo volátil. Rendimientos pasados no garantizan resultados futuros.<br>
    ArcadiaB, S.A. de C.V., SOFOM E.N.R., regulada por CONDUSEF.
  </div>
</div>
</body>
</html>
