<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 200px;
  background: rgba(0,0,0,0.4);
  font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}
.overlay {
  text-align: center;
}
.year {
  color: white;
  font-size: 48px;
  font-weight: 800;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8), 0 0 40px rgba(0,0,0,0.5);
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.value {
  color: #FFB84D;
  font-size: 64px;
  font-weight: 800;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8), 0 0 40px rgba(0,0,0,0.5);
}
</style>
</head>
<body>
<div class="overlay">
  <div class="year">2024</div>
  <div class="value">$100 = $42 MXN</div>
</div>
</body>
</html>
