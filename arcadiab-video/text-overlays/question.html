<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 300px;
  background: rgba(0,0,0,0.4);
  font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}
.overlay {
  text-align: center;
  padding: 30px 60px;
  background: rgba(0,0,0,0.4);
  border-radius: 16px;
}
.text {
  color: white;
  font-size: 52px;
  font-weight: 700;
  text-shadow: 0 2px 20px rgba(0,0,0,0.9), 0 0 40px rgba(0,0,0,0.6);
  line-height: 1.3;
}
</style>
</head>
<body>
<div class="overlay">
  <div class="text">¿Cuánto más<br>vas a esperar?</div>
</div>
</body>
</html>
